<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_INTERFACE</title>
    <style>
        body { 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            margin: 0; 
        }

        .modal {
            background: rgba(10, 15, 10, 0.9);
            border: 1px solid #00ff41;
            padding: 50px;
            width: 650px;
            box-shadow: 0 0 35px rgba(0, 255, 65, 0.7), inset 0 0 20px rgba(0, 255, 65, 0.3);
            text-align: center;
        }

        input { 
            width: 85%; 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 15px; 
            margin: 20px 0; 
            font-size: 18px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px #00ff41;
        }

        button { 
            background: #001100; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 15px 40px; 
            cursor: pointer; 
            font-size: 18px; 
            margin: 15px; 
            font-weight: bold;
        }

        button:hover { 
            background: #00ff41; 
            color: #000; 
            box-shadow: 0 0 20px #00ff41; 
        }

        #controlPanel { display: none; }
        
        #logs { 
            margin-top: 30px; 
            text-align: left; 
            height: 250px; 
            overflow-y: auto; 
            font-size: 14px; 
            border: 1px solid #333; 
            padding: 15px; 
            background: #020202;
            box-shadow: inset 0 0 10px #000;
        }
    </style>
</head>
<body>

    <div id="setupModal" class="modal">
        <h2>SYSTEM_INITIALIZATION</h2>
        <input type="text" id="phone" placeholder="ENTER_PHONE_NUMBER">
        <input type="text" id="target" placeholder="SELECT_TARGET_GROUP">
        <br>
        <button onclick="confirmSetup()">CONFIRM_ACCESS</button>
    </div>

    <div id="controlPanel" class="modal">
        <h2>SYSTEM_RUNNING</h2>
        <button onclick="startAction()">[ START ]</button>
        <button onclick="stopAction()">[ STOP ]</button>
        <div id="logs"></div>
    </div>

    <script>
        function confirmSetup() {
            const phoneVal = document.getElementById('phone').value;
            const targetVal = document.getElementById('target').value;
            
            if(phoneVal.trim() !== "" && targetVal.trim() !== "") {
                document.getElementById('setupModal').style.display = 'none';
                document.getElementById('controlPanel').style.display = 'block';
            } else {
                alert("ERROR: FIELDS_CANNOT_BE_EMPTY");
            }
        }

        let actionInterval;

        function startAction() {
            const logs = document.getElementById('logs');
            if(actionInterval) clearInterval(actionInterval);
            
            const initEntry = document.createElement('div');
            initEntry.style.color = "#fff";
            initEntry.innerText = `[${new Date().toLocaleTimeString()}] SYSTEM_STARTING_SEQUENCE...`;
            logs.appendChild(initEntry);

            actionInterval = setInterval(() => {
                const entry = document.createElement('div');
                const randomHex = Math.floor(Math.random()*16777215).toString(16).toUpperCase();
                entry.innerText = `[${new Date().toLocaleTimeString()}] DATA_PACKET_SENT_TO_NODE_0x${randomHex}`;
                logs.appendChild(entry);
                logs.scrollTop = logs.scrollHeight;
            }, 150);
        }

        function stopAction() {
            clearInterval(actionInterval);
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.style.color = "red";
            entry.innerText = `[${new Date().toLocaleTimeString()}] PROCESS_TERMINATED_BY_USER`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
